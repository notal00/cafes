<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>北京咖啡地图</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root {
      --bg:          #f8f7f4;
      --surface:     #ffffff;
      --surface-alt: #f2f0eb;
      --border:      #e2ded6;
      --accent:      #3a6b4a;
      --accent-soft: #d4e6da;
      --accent-dim:  #6a9d7a;
      --text-hi:     #1a1a18;
      --text-mid:    #4a4a45;
      --text-lo:     #9a9890;
      --gold:        #c8a96e;
      --shadow:      0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.05);
      --shadow-lg:   0 2px 8px rgba(0,0,0,.08), 0 12px 40px rgba(0,0,0,.10);
      --radius:      12px;
      --font-serif:  'Cormorant Garamond', Georgia, serif;
      --font-sans:   'DM Sans', system-ui, sans-serif;
      --transition:  .22s cubic-bezier(.4,0,.2,1);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:          #141412;
        --surface:     #1e1e1b;
        --surface-alt: #252520;
        --border:      #2e2e29;
        --accent:      #5a9e6f;
        --accent-soft: #1c3324;
        --accent-dim:  #4a8460;
        --text-hi:     #f0ede6;
        --text-mid:    #b0ada6;
        --text-lo:     #6a6860;
        --gold:        #c8a96e;
        --shadow:      0 1px 3px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.25);
        --shadow-lg:   0 2px 8px rgba(0,0,0,.4), 0 12px 40px rgba(0,0,0,.35);
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text-hi);
      min-height: 100dvh;
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .app { display: flex; flex-direction: column; min-height: 100dvh; }

    /* Header */
    header {
      padding: 24px 24px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky; top: 0; z-index: 100;
    }
    .header-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: flex-end; justify-content: space-between; gap: 16px;
    }
    .brand-title {
      font-family: var(--font-serif);
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 400; letter-spacing: .04em; line-height: 1.2;
    }
    .brand-title em { font-style: italic; color: var(--accent); }
    .brand-sub {
      font-size: 10px; letter-spacing: .18em; text-transform: uppercase;
      color: var(--text-lo); font-weight: 300; margin-top: 2px;
    }
    .count-badge {
      background: var(--accent-soft); color: var(--accent);
      font-size: 11px; font-weight: 500; letter-spacing: .06em;
      padding: 4px 11px; border-radius: 20px; white-space: nowrap;
    }

    /* Search */
    .search-bar { max-width: 1200px; margin: 0 auto; padding: 14px 24px 0; }
    .search-wrap { position: relative; }
    .search-icon {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%); color: var(--text-lo); pointer-events: none;
    }
    .search-input {
      width: 100%; padding: 10px 16px 10px 38px;
      border: 1px solid var(--border); border-radius: 8px;
      background: var(--surface); color: var(--text-hi);
      font-family: var(--font-sans); font-size: 13px;
      outline: none; transition: border-color var(--transition);
    }
    .search-input:focus { border-color: var(--accent-dim); }
    .search-input::placeholder { color: var(--text-lo); }

    /* Main grid */
    main {
      flex: 1; max-width: 1200px; margin: 0 auto; width: 100%;
      padding: 20px 24px 48px;
      display: grid; grid-template-columns: 1fr 420px; gap: 24px; align-items: start;
    }
    @media (max-width: 860px) { main { grid-template-columns: 1fr; } }

    /* List */
    .list-panel { min-width: 0; }
    .alpha-section { margin-bottom: 28px; }
    .alpha-label {
      font-family: var(--font-serif); font-size: 30px; font-weight: 300;
      color: var(--accent); letter-spacing: .06em; line-height: 1;
      border-left: 2px solid var(--accent); padding-left: 10px; margin-bottom: 10px;
    }

    /* Card */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 15px 18px; margin-bottom: 8px;
      cursor: pointer; transition: all var(--transition);
      display: grid; grid-template-columns: 1fr auto; gap: 8px 14px;
      align-items: start; position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: var(--accent); opacity: 0; transition: opacity var(--transition);
    }
    .card:hover { border-color: var(--accent-dim); box-shadow: var(--shadow); transform: translateY(-1px); }
    .card:hover::before { opacity: 1; }
    .card.active { border-color: var(--accent); background: var(--accent-soft); box-shadow: var(--shadow); }
    .card.active::before { opacity: 1; }

    .card-name { font-family: var(--font-serif); font-size: 17px; font-weight: 500; letter-spacing: .02em; line-height: 1.3; }
    .card-location {
      font-size: 11.5px; color: var(--text-lo); margin-top: 3px;
      display: flex; align-items: center; gap: 4px;
    }
    .card-note {
      font-size: 12.5px; color: var(--text-mid); margin-top: 6px;
      line-height: 1.5; font-style: italic; font-family: var(--font-serif);
    }
    .card-score { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .score-num { font-family: var(--font-serif); font-size: 25px; font-weight: 300; color: var(--accent); line-height: 1; }
    .score-num span { font-size: 12px; color: var(--text-lo); }
    .stars { display: flex; gap: 2px; }
    .star { width: 7px; height: 7px; border-radius: 50%; background: var(--border); }
    .star.filled { background: var(--gold); }

    /* Map */
    .map-panel { position: sticky; top: 90px; }
    @media (max-width: 860px) { .map-panel { position: static; order: -1; } }
    .map-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow);
    }
    .map-header {
      padding: 13px 16px 11px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .map-title { font-family: var(--font-serif); font-size: 15px; font-weight: 400; letter-spacing: .04em; }
    .map-hint { font-size: 11px; color: var(--text-lo); }
    #map { height: 420px; width: 100%; }
    @media (max-width: 860px) { #map { height: 280px; } }
    .map-info {
      padding: 12px 16px; border-top: 1px solid var(--border);
      min-height: 54px; display: flex; align-items: center; gap: 10px;
    }
    .map-info-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
    .map-info-name { font-family: var(--font-serif); font-size: 15px; }
    .map-info-loc { font-size: 11px; color: var(--text-lo); margin-top: 1px; }
    .map-placeholder { color: var(--text-lo); font-size: 12px; letter-spacing: .04em; }

    /* States */
    .state-message { padding: 60px 24px; text-align: center; color: var(--text-lo); }
    .state-message h3 { font-family: var(--font-serif); font-size: 20px; font-weight: 300; margin-bottom: 8px; }
    .state-message p { font-size: 13px; }
    .spinner {
      width: 26px; height: 26px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .7s linear infinite; margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Config banner */
    .config-banner {
      background: #fff8ed; border: 1px solid #f0d89a;
      border-radius: 8px; padding: 13px 17px; margin-bottom: 18px;
      font-size: 12.5px; color: #7a5a10; line-height: 1.7;
    }
    @media (prefers-color-scheme: dark) {
      .config-banner { background: #2a2010; border-color: #5a4520; color: #c8a96e; }
    }
    .config-banner code {
      background: rgba(0,0,0,.08); padding: 1px 5px;
      border-radius: 3px; font-size: 11.5px; font-family: monospace;
    }

    /* Leaflet popup */
    .leaflet-popup-content-wrapper {
      border-radius: 10px !important; font-family: var(--font-sans) !important;
    }
    .popup-name { font-family: var(--font-serif); font-size: 15px; font-weight: 500; margin-bottom: 3px; }
    .popup-score { font-size: 12px; color: var(--accent); font-weight: 500; }
    .popup-note { font-size: 12px; color: #666; margin-top: 4px; font-style: italic; font-family: var(--font-serif); }

    footer {
      border-top: 1px solid var(--border); padding: 14px 24px;
      text-align: center; font-size: 11px; color: var(--text-lo); letter-spacing: .08em;
    }
    footer em { font-style: italic; font-family: var(--font-serif); }
  </style>
</head>
<body>
<div class="app">

  <header>
    <div class="header-inner">
      <div>
        <div class="brand-title">北京 <em>Café</em> Map</div>
        <div class="brand-sub">Ma carte des cafés de Pékin</div>
      </div>
      <div class="count-badge" id="count-badge">— 家</div>
    </div>
  </header>

  <div class="search-bar">
    <div class="search-wrap">
      <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input class="search-input" type="text" id="search" placeholder="搜索咖啡厅名称、位置…" autocomplete="off" />
    </div>
  </div>

  <main>
    <div class="list-panel" id="list-panel">
      <div class="state-message">
        <div class="spinner"></div>
        <h3>正在加载…</h3>
      </div>
    </div>

    <div class="map-panel">
      <div class="map-card">
        <div class="map-header">
          <div class="map-title">位置地图</div>
          <div class="map-hint">点击卡片定位</div>
        </div>
        <div id="map"></div>
        <div class="map-info" id="map-info">
          <div class="map-placeholder">未选择咖啡厅</div>
        </div>
      </div>
    </div>
  </main>

  <footer><em>une collection personnelle</em> · 北京咖啡地图</footer>
</div>

<script>
// ══════════════════════════════════════
//  !! 填入你的 Supabase 配置 !!
// ══════════════════════════════════════
const SUPABASE_URL  = 'YOUR_SUPABASE_URL';       // https://xxxx.supabase.co
const SUPABASE_ANON = 'YOUR_SUPABASE_ANON_KEY';  // anon public key
const TABLE_NAME    = 'cafes';

// ══════════════════════════════════════
//  Fetch from Supabase (无需SDK)
// ══════════════════════════════════════
async function fetchCafes() {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/${TABLE_NAME}?select=*&order=name.asc`,
    { headers: { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}` } }
  );
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ══════════════════════════════════════
//  Map setup
// ══════════════════════════════════════
const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
const map = L.map('map', { center: [39.9042, 116.4074], zoom: 11, zoomControl: true, attributionControl: false });

L.tileLayer(
  dark
    ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
    : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  { subdomains: 'abcd', maxZoom: 19 }
).addTo(map);

const markers = {};
let activeId = null;

function makeIcon(active) {
  const sz = active ? 14 : 10;
  return L.divIcon({
    className: '',
    html: `<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${active?'#3a6b4a':'#6a9d7a'};border:2px solid ${dark?'#141412':'#fff'};box-shadow:0 1px 4px rgba(0,0,0,.3);"></div>`,
    iconSize: [sz, sz], iconAnchor: [sz/2, sz/2],
  });
}

function addMarker(cafe) {
  if (!cafe.lat || !cafe.lng) return;
  const m = L.marker([cafe.lat, cafe.lng], { icon: makeIcon(false) }).addTo(map);
  m.bindPopup(`
    <div class="popup-name">${cafe.name}</div>
    ${cafe.score != null ? `<div class="popup-score">${'★'.repeat(Math.round(cafe.score/2))} ${cafe.score}/10</div>` : ''}
    ${cafe.note ? `<div class="popup-note">${cafe.note}</div>` : ''}
  `, { maxWidth: 200 });
  m.on('click', () => highlightCard(cafe.id));
  markers[cafe.id] = { marker: m, cafe };
}

function flyTo(cafe) {
  if (!cafe.lat || !cafe.lng) return;
  map.flyTo([cafe.lat, cafe.lng], 15, { duration: .9 });
  if (activeId != null && markers[activeId]) {
    markers[activeId].marker.setIcon(makeIcon(false));
    markers[activeId].marker.closePopup();
  }
  if (markers[cafe.id]) {
    markers[cafe.id].marker.setIcon(makeIcon(true));
    setTimeout(() => markers[cafe.id]?.marker.openPopup(), 900);
  }
  activeId = cafe.id;
  document.getElementById('map-info').innerHTML = `
    <div class="map-info-dot"></div>
    <div>
      <div class="map-info-name">${cafe.name}</div>
      <div class="map-info-loc">${cafe.location || ''}</div>
    </div>`;
}

function highlightCard(id) {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  const card = document.querySelector(`.card[data-id="${id}"]`);
  if (card) { card.classList.add('active'); card.scrollIntoView({ behavior:'smooth', block:'nearest' }); }
}

// ══════════════════════════════════════
//  Render list
// ══════════════════════════════════════
let allCafes = [];

function stars(score) {
  const n = Math.round((score||0)/2);
  return Array.from({length:5},(_,i)=>`<div class="star${i<n?' filled':''}"></div>`).join('');
}

function renderList(cafes) {
  const panel = document.getElementById('list-panel');
  if (!cafes.length) {
    panel.innerHTML = `<div class="state-message"><h3>暂无结果</h3><p>尝试其他关键词</p></div>`;
    return;
  }
  const notConfigured = SUPABASE_URL === 'YOUR_SUPABASE_URL';
  const groups = {};
  cafes.forEach(c => {
    const k = (c.name||'?')[0].toUpperCase();
    (groups[k] = groups[k]||[]).push(c);
  });
  const sortedKeys = Object.keys(groups).sort((a,b) => a.localeCompare(b,'zh'));
  let html = notConfigured ? `<div class="config-banner">
    <strong>配置说明：</strong>请在文件顶部填入 <code>SUPABASE_URL</code> 和 <code>SUPABASE_ANON_KEY</code>，
    并在 Supabase 中创建表 <code>${TABLE_NAME}</code>，字段：<code>id</code>（int8, PK）、
    <code>name</code>（text）、<code>location</code>（text）、<code>score</code>（float4）、
    <code>note</code>（text）、<code>lat</code>（float8）、<code>lng</code>（float8）。
    当前为演示数据。
  </div>` : '';

  sortedKeys.forEach(k => {
    html += `<div class="alpha-section"><div class="alpha-label">${k}</div>`;
    groups[k].forEach(c => {
      html += `<div class="card" data-id="${c.id}" onclick="onCardClick('${c.id}')">
        <div>
          <div class="card-name">${c.name}</div>
          ${c.location?`<div class="card-location">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
            ${c.location}
          </div>`:''}
          ${c.note?`<div class="card-note">${c.note}</div>`:''}
        </div>
        ${c.score!=null?`<div class="card-score">
          <div class="score-num">${c.score}<span>/10</span></div>
          <div class="stars">${stars(c.score)}</div>
        </div>`:''}
      </div>`;
    });
    html += `</div>`;
  });
  panel.innerHTML = html;
}

function onCardClick(id) {
  highlightCard(id);
  const cafe = allCafes.find(c => String(c.id) === String(id));
  if (cafe) flyTo(cafe);
}

document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.trim().toLowerCase();
  renderList(q ? allCafes.filter(c =>
    (c.name||'').toLowerCase().includes(q) ||
    (c.location||'').toLowerCase().includes(q) ||
    (c.note||'').toLowerCase().includes(q)
  ) : allCafes);
});

// ══════════════════════════════════════
//  Demo data
// ══════════════════════════════════════
const DEMO = [
  { id:1, name:'Seesaw Coffee', location:'朝阳区 三里屯太古里', score:8.5, note:'空间宽敞，氛围极佳，出品稳定', lat:39.9333, lng:116.4543 },
  { id:2, name:'manner coffee', location:'朝阳区 工体西路', score:7.0, note:'性价比高，出餐快', lat:39.9289, lng:116.4461 },
  { id:3, name:'%Arabica', location:'朝阳区 三里屯', score:8.0, note:'颜值高，适合拍照', lat:39.9321, lng:116.4539 },
  { id:4, name:'隅田川咖啡', location:'东城区 南锣鼓巷', score:7.5, note:'胡同里的小确幸', lat:39.9356, lng:116.3960 },
  { id:5, name:'Blue Bottle Coffee', location:'朝阳区 望京', score:8.2, note:'单品出色，必点手冲', lat:39.9959, lng:116.4813 },
  { id:6, name:'Bongenie', location:'西城区 金融街', score:7.8, note:'安静，适合工作', lat:39.9169, lng:116.3633 },
];

// ══════════════════════════════════════
//  Init
// ══════════════════════════════════════
async function init() {
  let data;
  if (SUPABASE_URL === 'YOUR_SUPABASE_URL') {
    data = DEMO;
  } else {
    try { data = await fetchCafes(); }
    catch(err) {
      document.getElementById('list-panel').innerHTML =
        `<div class="state-message"><h3>加载失败</h3><p>${err.message}</p></div>`;
      return;
    }
  }
  allCafes = data;
  document.getElementById('count-badge').textContent = `${data.length} 家`;
  renderList(data);
  data.forEach(addMarker);
}

init();
</script>
</body>
</html>
