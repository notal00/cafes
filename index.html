<!DOCTYPE html>

<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beijing Café Map</title>

  <!-- Fonts: Inter (UI) + Noto Sans SC (Chinese) -->

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Leaflet -->

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    /* ── Tokens ── */
    :root {
      --bg:         #ffffff;
      --surface:    #ffffff;
      --surface-2:  #fafafa;
      --border:     #f0f0f0;
      --border-mid: #e0e0e0;
      --accent:     #c0392b;
      --accent-2:   #e74c3c;
      --accent-bg:  #fff5f5;
      --text-1:     #111111;
      --text-2:     #555555;
      --text-3:     #999999;
      --shadow-s:   0 1px 2px rgba(0,0,0,.05);
      --shadow-m:   0 2px 8px rgba(0,0,0,.07), 0 0 0 1px rgba(0,0,0,.04);
      --radius:     8px;
      --font-ui:    'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-zh:    'Noto Sans SC', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      --ease:       .18s cubic-bezier(.4,0,.2,1);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:         #0f0f0f;
        --surface:    #161616;
        --surface-2:  #1c1c1c;
        --border:     #242424;
        --border-mid: #2e2e2e;
        --accent:     #e05050;
        --accent-2:   #f06060;
        --accent-bg:  #1e1010;
        --text-1:     #f0f0f0;
        --text-2:     #a0a0a0;
        --text-3:     #585858;
        --shadow-s:   0 1px 2px rgba(0,0,0,.3);
        --shadow-m:   0 2px 8px rgba(0,0,0,.4), 0 0 0 1px rgba(255,255,255,.04);
      }
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text-1);
      min-height: 100dvh;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    .zh { font-family: var(--font-zh); }

    .app { display: flex; flex-direction: column; min-height: 100dvh; }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 200;
    }
    .header-inner {
      max-width: 1160px; margin: 0 auto;
      padding: 0 24px;
      height: 60px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .brand { display: flex; align-items: baseline; gap: 10px; }
    .brand-en {
      font-family: var(--font-ui);
      font-size: 17px; font-weight: 600;
      letter-spacing: -.02em; color: var(--text-1);
    }
    .brand-en span { color: var(--accent); }
    .brand-zh {
      font-family: var(--font-zh);
      font-size: 12px; font-weight: 300;
      color: var(--text-3); letter-spacing: .04em;
    }
    .count-pill {
      font-size: 11px; font-weight: 500;
      background: var(--accent-bg); color: var(--accent);
      padding: 3px 10px; border-radius: 20px;
      letter-spacing: .02em; white-space: nowrap;
      border: 1px solid color-mix(in srgb, var(--accent) 15%, transparent);
    }

    /* ── Content wrapper (search + main share same max-width & padding) ── */
    .content-wrap {
      max-width: 1160px; margin: 0 auto; width: 100%; padding: 0 24px;
    }

    /* ── Search ── */
    .search-row { padding: 16px 0 0; }
    .search-wrap { position: relative; }
    .search-icon {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%); color: var(--text-3); pointer-events: none;
    }
    .search-input {
      width: 100%; padding: 9px 14px 9px 36px;
      border: 1px solid var(--border-mid); border-radius: var(--radius);
      background: var(--surface-2); color: var(--text-1);
      font-family: var(--font-ui); font-size: 13px;
      outline: none; transition: border-color var(--ease), box-shadow var(--ease);
    }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 12%, transparent);
    }
    .search-input::placeholder { color: var(--text-3); }

    /* ── Main grid ── */
    .main-grid {
      padding: 20px 0 48px;
      display: grid; grid-template-columns: 1fr 400px; gap: 20px; align-items: start;
    }
    @media (max-width: 840px) { .main-grid { grid-template-columns: 1fr; } }

    /* ── List Panel ── */
    .list-panel { min-width: 0; }
    .alpha-section { margin-bottom: 24px; }
    .alpha-label {
      font-size: 11px; font-weight: 600; letter-spacing: .1em;
      text-transform: uppercase; color: var(--accent);
      padding: 0 0 8px 2px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: border-color var(--ease), box-shadow var(--ease), background var(--ease);
      display: grid; grid-template-columns: 1fr auto;
      gap: 6px 14px; align-items: start;
    }
    .card:hover {
      border-color: var(--border-mid);
      box-shadow: var(--shadow-m);
    }
    .card.active {
      border-color: var(--accent);
      background: var(--accent-bg);
      box-shadow: 0 0 0 1px var(--accent), var(--shadow-s);
    }

    .card-name {
      font-size: 14px; font-weight: 500;
      color: var(--text-1); line-height: 1.4;
      font-family: var(--font-ui);
    }
    /* Chinese café names fallback */
    .card-name.has-zh { font-family: var(--font-zh); }
    .card-loc {
      font-size: 12px; color: var(--text-3); margin-top: 3px;
      display: flex; align-items: center; gap: 4px;
      font-family: var(--font-zh); font-weight: 300;
    }
    .card-note {
      font-size: 12px; color: var(--text-2); margin-top: 5px;
      line-height: 1.6; font-family: var(--font-zh); font-weight: 300;
    }
    .card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
    .score-val {
      font-size: 20px; font-weight: 300; color: var(--accent); line-height: 1;
      letter-spacing: -.02em;
    }
    .score-val sub { font-size: 10px; color: var(--text-3); vertical-align: baseline; }
    .dots { display: flex; gap: 3px; }
    .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border-mid); }
    .dot.on { background: var(--accent); }

    /* ── Map Panel ── */
    .map-panel { position: sticky; top: 80px; }
    @media (max-width: 840px) { .map-panel { position: static; order: -1; } }

    .map-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-s);
      background: var(--surface);
    }
    .map-header {
      padding: 11px 14px 10px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .map-label {
      font-size: 12px; font-weight: 500; color: var(--text-1); letter-spacing: .02em;
    }
    .map-tip { font-size: 11px; color: var(--text-3); }
    #map { height: 400px; width: 100%; }
    @media (max-width: 840px) { #map { height: 260px; } }
    .map-foot {
      padding: 10px 14px; border-top: 1px solid var(--border);
      min-height: 50px; display: flex; align-items: center; gap: 8px;
    }
    .map-foot-dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0;
    }
    .map-foot-name { font-size: 13px; font-weight: 500; font-family: var(--font-zh); line-height: 1.3; }
    .map-foot-loc { font-size: 11px; color: var(--text-3); margin-top: 2px; font-family: var(--font-zh); }
    .map-foot-empty { font-size: 12px; color: var(--text-3); }

    /* ── State ── */
    .state { padding: 56px 0; text-align: center; color: var(--text-3); }
    .state h3 { font-size: 15px; font-weight: 400; margin-bottom: 6px; font-family: var(--font-zh); }
    .state p { font-size: 12px; font-family: var(--font-zh); }
    .spin {
      width: 22px; height: 22px; border: 1.5px solid var(--border-mid);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .65s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 14px 24px;
      text-align: center;
    }
    .footer-inner {
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .footer-en { font-size: 12px; font-weight: 500; color: var(--text-3); letter-spacing: .04em; }
    .footer-en span { color: var(--accent); }
    .footer-sep { color: var(--border-mid); font-size: 14px; }
    .footer-zh { font-size: 12px; color: var(--text-3); font-family: var(--font-zh); font-weight: 300; }

    /* ── Leaflet popup ── */
    .leaflet-popup-content-wrapper {
      border-radius: 8px !important;
      border: 1px solid var(--border-mid) !important;
      box-shadow: var(--shadow-m) !important;
      padding: 0 !important;
      overflow: hidden !important;
    }
    .leaflet-popup-content { margin: 0 !important; padding: 12px 14px !important; }
    .leaflet-popup-tip-container { display: none !important; }
    .p-name { font-size: 13px; font-weight: 500; margin-bottom: 3px; font-family: var(--font-zh); }
    .p-score { font-size: 11px; color: var(--accent); font-weight: 600; }
    .p-note { font-size: 11px; color: #777; margin-top: 4px; font-family: var(--font-zh); font-weight: 300; }
  </style>

</head>
<body>
<script>window.onerror = function(msg, src, line, col, err) {
  var el = document.getElementById('list-panel');
  if (el) el.innerHTML = '<div class="state"><h3>JS错误</h3><p>' + msg + ' @ ' + src + ':' + line + '</p></div>';
};</script>
<div class="app">

  <header>
    <div class="header-inner">
      <div class="brand">
        <div class="brand-en">Beijing <span>Café</span> Map</div>
        <div class="brand-zh zh">北京咖啡地图</div>
      </div>
      <div class="count-pill" id="count-pill">— 家</div>
    </div>
  </header>

  <div class="content-wrap">
    <div class="search-row">
      <div class="search-wrap">
        <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input class="search-input" id="search" type="text" placeholder="搜索名称、位置…" autocomplete="off" />

    </div>


<div class="main-grid">

      <h3>正在加载…</h3>

  <div class="map-panel">

</div>
<script>
// ── Supabase config ──────────────────────────
const SUPABASE_URL  = 'https://zkpctzxyqpiiqxvnmauo.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InprcGN0enh5cXBpaXF4dm5tYXVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNDkxNDAsImV4cCI6MjA5MDkyNTE0MH0.Z7WdneCs_vJOblWho1neuMLI86h1FrdNqi6N2-DI4ZQ';
const TABLE_NAME    = 'cafes';

async function fetchCafes() {
const r = await fetch(
`${SUPABASE_URL}/rest/v1/${TABLE_NAME}?select=*&order=name.asc`,
{ headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` } }
);
if (!r.ok) throw new Error(`HTTP ${r.status}`);
return r.json();
}

// ── Map ──────────────────────────────────────
const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
const accentColor = dark ? '#e05050' : '#c0392b';
const bgColor     = dark ? '#0f0f0f' : '#ffffff';

const map = L.map('map', {
center: [39.9042, 116.4074], zoom: 11,
zoomControl: true, attributionControl: false,
});
L.tileLayer(
dark
? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
{ subdomains: 'abcd', maxZoom: 19 }
).addTo(map);

const markers = {};
let activeId = null;

function mkIcon(active) {
const s = active ? 13 : 9;
return L.divIcon({
className: '',
html: `<div style="width:${s}px;height:${s}px;border-radius:50%;background:${accentColor};border:2px solid ${bgColor};box-shadow:0 1px 4px rgba(0,0,0,.25);opacity:${active?1:.7};"></div>`,
iconSize: [s,s], iconAnchor: [s/2,s/2],
});
}

function addMarker(c) {
if (!c.lat || !c.lng) return;
const m = L.marker([c.lat, c.lng], { icon: mkIcon(false) }).addTo(map);
m.bindPopup(`<div class="p-name">${c.name}</div> ${c.score != null ?`<div class="p-score">${c.score} / 5</div>`: ``} ${c.note ?`<div class="p-note">${c.note}</div>`: ''}`, { maxWidth: 200, closeButton: false });
m.on('click', () => highlightCard(c.id));
markers[c.id] = { marker: m, cafe: c };
}

function flyTo(c) {
if (!c.lat || !c.lng) return;
map.flyTo([c.lat, c.lng], 15, { duration: .85 });
if (activeId != null && markers[activeId]) {
markers[activeId].marker.setIcon(mkIcon(false));
markers[activeId].marker.closePopup();
}
if (markers[c.id]) {
markers[c.id].marker.setIcon(mkIcon(true));
setTimeout(() => markers[c.id]?.marker.openPopup(), 850);
}
activeId = c.id;
document.getElementById('map-foot').innerHTML = `<div class="map-foot-dot"></div> <div> <div class="map-foot-name">${c.name}</div> ${c.location ?`<div class="map-foot-loc">${c.location}</div>` : ''} </div>`;
}

function highlightCard(id) {
document.querySelectorAll('.card').forEach(el => el.classList.remove('active'));
const el = document.querySelector(`.card[data-id="${id}"]`);
if (el) { el.classList.add('active'); el.scrollIntoView({ behavior:'smooth', block:'nearest' }); }
}

// ── Render ───────────────────────────────────
let allCafes = [];

function hasChinese(s) { return /[\u4e00-\u9fff]/.test(s); }

function dotRow(score) {
const n = Math.round(score||0);
return Array.from({length:5},(_,i)=>`<div class="dot${i<n?' on':''}"></div>`).join('');
}

function renderList(cafes) {
const panel = document.getElementById('list-panel');
if (!cafes.length) {
panel.innerHTML = `<div class="state"><h3>暂无结果</h3><p>换个关键词试试</p></div>`;
return;
}

// Group by alpha_label field if present, else first char of name
const groups = {};
cafes.forEach(c => {
const k = (c.alpha_label || (c.name||'?')[0]).toUpperCase();
(groups[k] = groups[k]||[]).push(c);
});
const keys = Object.keys(groups).sort((a,b) => a.localeCompare(b,'en'));

let html = '';
keys.forEach(k => {
html += `<div class="alpha-section"><div class="alpha_label">${k}</div>`;
groups[k].forEach(c => {
const zhName = hasChinese(c.name);
html += `<div class="card" data-id="${c.id}" onclick="onCardClick('${c.id}')"> <div> <div class="card-name${zhName?' has-zh zh':''}">${c.name}</div> ${c.location ? `<div class="card-loc">
<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
<path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
<circle cx="12" cy="9" r="2.5"/>
</svg>${c.location}
</div>`: ''} ${c.note ?`<div class="card-note">${c.note}</div>`: ''} </div> ${c.score != null ?`<div class="card-right">
<div class="score-val">${c.score}<sub>/5</sub></div>
<div class="dots">${dotRow(c.score)}</div>
</div>` : ''} </div>`;
});
html += `</div>`;
});
panel.innerHTML = html;
}

function onCardClick(id) {
highlightCard(id);
const c = allCafes.find(x => String(x.id) === String(id));
if (c) flyTo(c);
}

document.getElementById('search').addEventListener('input', e => {
const q = e.target.value.trim().toLowerCase();
renderList(q ? allCafes.filter(c =>
(c.name||'').toLowerCase().includes(q) ||
(c.location||'').toLowerCase().includes(q) ||
(c.note||'').toLowerCase().includes(q)
) : allCafes);
});

// ── Init ─────────────────────────────────────
function showError(msg) {
document.getElementById('list-panel').innerHTML =
`<div class="state"><h3>出错了</h3><p style="font-size:11px;word-break:break-all;max-width:400px;margin:6px auto 0">${msg}</p></div>`;
}

async function init() {
// 8 second timeout
const controller = new AbortController();
const timer = setTimeout(() => controller.abort(), 8000);

try {
const url = `${SUPABASE_URL}/rest/v1/${TABLE_NAME}?select=*&order=name.asc&apikey=${SUPABASE_ANON}`;
let res;
try {
res = await fetch(url, {
signal: controller.signal,
headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` }
});
} catch(fetchErr) {
showError(`fetch 失败: ${fetchErr.message}`);
return;
} finally {
clearTimeout(timer);
}

</script>
